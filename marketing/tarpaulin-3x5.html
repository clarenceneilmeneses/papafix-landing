<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PapaFix Tarpaulin — 3×5 ft portrait (914 × 1524 mm)</title>
<!--
  PRINT SPECS
  Size: 3 × 5 ft portrait = 914 × 1524 mm (36 × 60 in). No bleed needed for tarps.
  All text and the logo sit ≥ 80 mm from every edge (eyelet/frame safe zone).
  Export from Chrome/Edge: Ctrl+P → Save as PDF → Margins: None → Scale: 100%
                           → check "Background graphics". Hand the PDF to the shop.
  QR code prints at ~240 mm — scannable from several meters away.
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet">
<style>
  @page { size: 914mm 1524mm; margin: 0; }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  :root {
    --brand: #f26b1d; --brand-deep: #c2410c; --brand-pale: #fff6ef; --ink: #0a0f1e;
  }
  html, body { width: 914mm; height: 1524mm; }
  body {
    font-family: 'DM Sans', sans-serif; color: white;
    background: linear-gradient(160deg, var(--brand) 0%, var(--brand-deep) 100%);
    display: flex; flex-direction: column; align-items: center; text-align: center;
    padding: 80mm 70mm; overflow: hidden;
  }

  .logo-row { display: flex; align-items: center; gap: 22mm; }
  .logo-row img { width: 110mm; height: 110mm; border-radius: 26mm; box-shadow: 0 8mm 30mm rgba(0,0,0,.25); }
  .wordmark { font-family: 'Sora', sans-serif; font-weight: 800; font-size: 62mm; letter-spacing: -0.02em; line-height: 1; }
  .wordmark .fix { color: var(--ink); }

  .soon {
    margin-top: 34mm; background: var(--ink); color: white;
    font-family: 'Sora', sans-serif; font-weight: 800; font-size: 24mm; letter-spacing: .12em;
    padding: 10mm 30mm; border-radius: 60mm;
  }

  .headline {
    font-family: 'Sora', sans-serif; font-weight: 800; letter-spacing: -0.02em;
    font-size: 82mm; line-height: 1.06; margin-top: 40mm;
    text-shadow: 0 3mm 12mm rgba(0,0,0,.18);
  }
  .headline .dark { color: var(--ink); }

  .sub {
    font-family: 'Sora', sans-serif; font-weight: 700; font-size: 29mm; line-height: 1.3;
    margin-top: 26mm;
  }
  .chips { display: flex; gap: 12mm; margin-top: 22mm; }
  .chip {
    background: rgba(255,255,255,.16); border: 1.2mm solid rgba(255,255,255,.7);
    font-family: 'Sora', sans-serif; font-weight: 700; font-size: 20mm;
    padding: 8mm 22mm; border-radius: 50mm;
  }

  .qr-wrap { margin-top: 46mm; background: white; border-radius: 24mm; padding: 20mm; box-shadow: 0 10mm 40mm rgba(0,0,0,.3); }
  .qr-wrap svg { width: 240mm; height: 240mm; display: block; }
  .cta {
    font-family: 'Sora', sans-serif; font-weight: 800; font-size: 46mm; letter-spacing: .02em;
    margin-top: 30mm; color: white;
  }
  .url {
    font-family: 'Sora', sans-serif; font-weight: 800; font-size: 42mm;
    background: white; color: var(--brand-deep); padding: 12mm 36mm; border-radius: 60mm;
    margin-top: 22mm;
  }
  .cities {
    font-family: 'Sora', sans-serif; font-weight: 700; font-size: 21mm; margin-top: 34mm;
    color: var(--brand-pale); letter-spacing: .02em;
  }
  .cities span { color: var(--ink); }
</style>
</head>
